version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: promo-flow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: promoflow
      POSTGRES_PASSWORD: promoflow  # pragma: allowlist secret
      POSTGRES_DB: promoflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promo-flow-backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://promoflow:promoflow@postgres:5432/promoflow  # pragma: allowlist secret
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promo-flow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
