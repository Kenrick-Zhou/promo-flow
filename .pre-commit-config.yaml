minimum_pre_commit_version: "4.3.0"
default_stages: [pre-commit]

repos:
  # ============ 通用检查 ============
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: check-yaml
      - id: check-json
        exclude: ^frontend/tsconfig.*\.json$   # tsconfig 使用 JSONC（允许注释）
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  # --- 敏感信息扫描 ---
  # 首次使用需先生成 baseline：detect-secrets scan > .secrets.baseline
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(backend/alembic/|backend/tests/|\.env\.example|.*\.lock)

  # ============ Python 后端 ============
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.20.0
    hooks:
      - id: pyupgrade
        args: ["--py311-plus"]
        files: ^backend/

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]
        files: ^backend/

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        files: ^backend/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
        exclude: ^backend/alembic/

  - repo: local
    hooks:
      - id: mypy-backend
        name: mypy (backend)
        entry: uv run --directory backend mypy app
        language: system
        pass_filenames: false
        files: ^backend/app/

  # ============ TypeScript 前端 ============
  - repo: local
    hooks:
      - id: prettier-frontend
        name: prettier (frontend)
        entry: bash -c 'cd frontend && npm run format:check'
        language: system
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx|css)$
      - id: eslint-frontend
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx)$
